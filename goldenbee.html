  <title>Golden Bee — التصويت السنوي</title>
  <style>
    :root{
      --bg:#0f1724;
      --card:#0b1220;
      --accent:#f6c84c;
      --muted:#9aa4b2;
      --glass: rgba(255,255,255,0.03);
      --gap:16px;
      --tile-size:110px;
    }
    *{box-sizing:border-box}
    html,body{height:100%}
    body{
      margin:0;
      font-family: "Segoe UI", Tahoma, Arial, "Noto Kufi Arabic", sans-serif;
      background: linear-gradient(180deg,#07101a 0%, #0b1622 100%);
      color:#e6eef6;
      padding:20px;
      direction:rtl;
    }
    header{display:flex;gap:12px;align-items:center;margin-bottom:18px}
    .title{font-size:20px;font-weight:700}
    .subtitle{color:var(--muted);font-size:13px}
    main{max-width:1100px;margin:0 auto}
    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(140px,1fr));
      gap:var(--gap);
    }
    .tile{
      background:linear-gradient(180deg, rgba(255,255,255,0.02), rgba(255,255,255,0.01));
      border-radius:12px;padding:14px;display:flex;flex-direction:column;gap:10px;align-items:center;
      justify-content:center;text-align:center;cursor:pointer;min-height:170px;border:1px solid rgba(255,255,255,0.03)
    }
    .tile:active{transform:scale(.995)}
    .circle{
      width:var(--tile-size);height:var(--tile-size);
      border-radius:999px;overflow:hidden;display:flex;align-items:center;justify-content:center;
      background:linear-gradient(135deg, rgba(246,200,76,0.08), rgba(246,200,76,0.03));
      border:2px solid rgba(246,200,76,0.06);position:relative;
    }
    /* important: crop to show top of image (face) */
    .circle img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
    .cat-title{font-size:14px;font-weight:600;color:gold}
    .cat-year{font-size:12px;color:var(--muted)}
    /* modal */
    .overlay{position:fixed;inset:0;background:rgba(2,6,12,0.6);display:none;align-items:center;justify-content:center;padding:20px;z-index:60}
    .overlay.open{display:flex}
    .modal{width:100%;max-width:920px;background:linear-gradient(180deg,#071622,#07101a);border-radius:12px;padding:16px;max-height:90vh;overflow:auto;border:1px solid rgba(255,255,255,0.04)}
    .modal-head{display:flex;align-items:center;justify-content:space-between}
    .modal-title{font-size:18px;font-weight:700}
    .close-btn{background:transparent;border:0;color:var(--muted);font-size:18px;cursor:pointer}
    .candidates{display:grid;grid-template-columns:repeat(auto-fill,minmax(220px,1fr));gap:12px;margin-top:14px}
    .candidate{background:var(--glass);padding:10px;border-radius:12px;display:flex;gap:10px;align-items:center}
    .avatar{width:72px;height:72px;border-radius:8px;overflow:hidden;flex-shrink:0}
    .avatar img{width:100%;height:100%;object-fit:cover;object-position:top center;display:block}
    .candidate .name{font-weight:700}
    .vote{background:var(--accent);color:#072029;border:0;padding:8px 10px;border-radius:8px;font-weight:700;cursor:pointer}
    .candidate input[type=radio]{display:none}
    footer{margin-top:18px;display:flex;gap:10px;justify-content:space-between;align-items:center}
    .btn{background:transparent;border:1px solid rgba(255,255,255,0.06);padding:10px 12px;border-radius:10px;color:var(--muted);cursor:pointer}
    .btn.primary{background:var(--accent);color:#072029;border:0}
    @media (max-width:640px){
      :root{--tile-size:86px}
      .grid{grid-template-columns:repeat(3,1fr)}
      .candidate{flex-direction:column;align-items:flex-start}
      .avatar{width:100%;height:120px;border-radius:8px}
    }
    .note{font-size:13px;color:var(--muted);margin:14px 0}
  </style>
</head>

    // حالة التخزين (يُخزَّن اختيار كل فئة في localStorage)
    const STORAGE_KEY = 'goldenBeeSelections';
    const state = {
      selections: JSON.parse(localStorage.getItem(STORAGE_KEY) || '{}')
    };

    const grid = document.getElementById('categories');
    const countEl = document.getElementById('count');
    const overlay = document.getElementById('overlay');
    const modalTitle = document.getElementById('modalTitle');
    const modalSubtitle = document.getElementById('modalSubtitle');
    const candidatesList = document.getElementById('candidatesList');
    let activeCatId = null;

    // render grid of categories
    function renderGrid() {
      grid.innerHTML = '';
      categories.forEach(cat => {
        const sel = state.selections[cat.id];
        const tile = document.createElement('button');
        tile.className = 'tile';
        tile.type = 'button';
        tile.setAttribute('data-id', cat.id);
        tile.setAttribute('aria-haspopup', 'dialog');

        const circle = document.createElement('div');
        circle.className = 'circle';

        const img = document.createElement('img');
        if (sel && sel.image) {
          img.src = sel.image;
          img.alt = sel.name || cat.title;
        } else {
          // default category image = goldenbeelogo.jpg
          img.src = 'goldenbeelogo.jpg';
          img.alt = cat.title + ' - شعار';
        }
        circle.appendChild(img);

        const title = document.createElement('div');
        title.className = 'cat-title';
        title.textContent = cat.title;

        const year = document.createElement('div');
        year.className = 'cat-year';
        year.textContent = cat.year;

        tile.appendChild(circle);
        tile.appendChild(title);
        tile.appendChild(year);

        tile.addEventListener('click', () => openModal(cat.id));

        grid.appendChild(tile);
      });

      countEl.textContent = categories.length;
    }

    // open modal for category
    function openModal(catId) {
      activeCatId = catId;
      const cat = categories.find(c => c.id === catId);
      if (!cat) return;
      modalTitle.textContent = cat.title;
      modalSubtitle.textContent = `عدد المرشحين: ${cat.candidates.length}`;

      candidatesList.innerHTML = '';
      const selectedId = state.selections[catId] && state.selections[catId].id;

      // name for radio group unique per category
      const radioGroupName = 'candidate_' + catId;

      cat.candidates.forEach(c => {
        const item = document.createElement('label');
        item.className = 'candidate';
        item.setAttribute('tabindex', '0');

        const input = document.createElement('input');
        input.type = 'radio';
        input.name = radioGroupName;
        input.value = c.id;
        if (selectedId === c.id) input.checked = true;

        input.addEventListener('change', () => {
          // store selection for this category
          state.selections[catId] = { id: c.id, name: c.name, image: c.image, subtitle: c.subtitle || '' };
          localStorage.setItem(STORAGE_KEY, JSON.stringify(state.selections));
          renderGrid();
          closeModal();
        });

        const avatar = document.createElement('div');
        avatar.className = 'avatar';
        const aImg = document.createElement('img');
        // if image missing, fallback to golden bee logo
        aImg.src = c.image || 'goldenbeelogo.jpg';
        aImg.alt = c.name;
        avatar.appendChild(aImg);

        const meta = document.createElement('div');
        meta.className = 'meta';
        meta.innerHTML = `<div class="name">${c.name}</div><div class="subtitle" style="color:var(--muted);font-size:13px">${c.subtitle || ''}</div>`;

        const voteWrap = document.createElement('div');
        const voteBtn = document.createElement('button');
        voteBtn.className = 'vote';
        voteBtn.type = 'button';
        voteBtn.textContent = 'تصويت';
        voteBtn.addEventListener('click', (e) => {
          e.preventDefault();
          input.checked = true;
          input.dispatchEvent(new Event('change'));
        });

        voteWrap.appendChild(voteBtn);

        item.appendChild(input);
        item.appendChild(avatar);
        item.appendChild(meta);
        item.appendChild(voteWrap);

        candidatesList.appendChild(item);
      });

      overlay.classList.add('open');
      overlay.setAttribute('aria-hidden','false');
    }

    function closeModal() {
      overlay.classList.remove('open');
      overlay.setAttribute('aria-hidden','true');
      activeCatId = null;
    }

    document.getElementById('closeModal').addEventListener('click', closeModal);
    overlay.addEventListener('click', (e) => { if (e.target === overlay) closeModal(); });

    // actions
    document.getElementById('clearAll').addEventListener('click', () => {
      if (confirm('هل أنت متأكد أنك تريد مسح جميع الاختيارات؟')) {
        state.selections = {};
        localStorage.removeItem(STORAGE_KEY);
        renderGrid();
      }
    });

    document.getElementById('submitVotes').addEventListener('click', () => {
      const keys = Object.keys(state.selections);
      if (keys.length === 0) { alert('لم تختر أي مرشح بعد.'); return; }
      // هنا يمكنك استبدال alert بعملية إرسال للـ server عبر fetch
      const lines = keys.map(k => {
        const s = state.selections[k];
        const cat = categories.find(c => c.id === k) || { title: k };
        return `${cat.title}: ${s.name}`;
      });
      alert('قائمة اختياراتك:\n' + lines.join('\n'));
    });

    // أول تشغيل
    renderGrid();
  </script>
